<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTD App - Suggestion & Feedback</title>
    <style>
        /* Mobile-first setup */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }
        
        body {
            /* Updated path to the file folder */
            background-image: url('file/0ce66943a5e234445522664f4d9009ce.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            overflow: hidden;
        }

        /* Initial Open Button Styling */
        .glass-btn {
            padding: 15px 40px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(77, 166, 255, 0.4);
            border-radius: 30px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: pulse 2s infinite;
        }

        .glass-btn:hover {
            background: rgba(77, 166, 255, 0.2);
            border-color: #4da6ff;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(77, 166, 255, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(77, 166, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(77, 166, 255, 0); }
        }

        /* Pure Glassmorphism Effect Container */
        .feedback-container {
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 30px 25px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            opacity: 0;
            transform: translateY(50px);
            animation: slideUpFade 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            display: none; /* Default hidden */
        }

        @keyframes slideUpFade {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 22px;
            color: #4da6ff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #f0f0f0;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .input-group input, .input-group textarea {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input::placeholder, .input-group textarea::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .input-group input:focus, .input-group textarea:focus {
            border: 1px solid #4da6ff;
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 10px rgba(77, 166, 255, 0.3);
        }

        .input-group textarea {
            resize: none;
            height: 110px;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, rgba(77, 166, 255, 0.9), rgba(0, 85, 179, 0.9));
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .submit-btn:active {
            transform: scale(0.95);
        }

        .submit-btn:disabled {
            background: #555;
            cursor: not-allowed;
            transform: scale(1);
        }

        /* Countdown & Thank You Message Styling */
        .thank-you-text {
            text-align: center;
            color: #fff;
            font-size: 16px;
            line-height: 1.5;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .check-icon {
            font-size: 50px;
            display: block;
            text-align: center;
            margin-bottom: 10px;
        }

        /* Modern Countdown UI */
        .countdown {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 15px;
        }

        .time-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(77, 166, 255, 0.4);
            border-radius: 8px;
            padding: 10px 5px;
            text-align: center;
            flex: 1;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .time-box span {
            display: block;
            font-size: 22px;
            font-weight: bold;
            color: #4da6ff;
            text-shadow: 0 0 5px rgba(77,166,255,0.5);
        }

        .time-box small {
            font-size: 10px;
            text-transform: uppercase;
            color: #ccc;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="file/Captain%20America(M4A_128K).m4a" type="audio/mp4">
    </audio>

    <audio id="tickMusic" loop>
        <source src="file/clock%20ticking%20sound%20effect(M4A_128K).m4a" type="audio/mp4">
    </audio>

    <div id="startState">
        <button id="openFormBtn" class="glass-btn">Give Feedback</button>
    </div>

    <div id="formState" class="feedback-container">
        <h2>Suggestions Tab</h2>
        <form id="feedbackForm" action="https://formspree.io/f/mkolpnzq" method="POST">
            <div class="input-group">
                <label for="userName">Your Name</label>
                <input type="text" id="userName" name="name" placeholder="Enter your name" required>
            </div>
            
            <div class="input-group">
                <label for="userMessage">Message / Subject</label>
                <textarea id="userMessage" name="message" placeholder="Write your suggestion here..." required></textarea>
            </div>

            <button type="submit" id="submitBtn" class="submit-btn">Send Mail</button>
        </form>
    </div>

    <div id="thankYouState" class="feedback-container" style="padding: 30px 20px;">
        <span class="check-icon">✅</span>
        <h2 style="color: #4caf50; margin-bottom: 10px; font-size: 20px;">Thank You!</h2>
        <p class="thank-you-text">Your feedback has been successfully submitted.</p>
        
        <h3 style="text-align: center; color: #fff; font-size: 14px; letter-spacing: 1px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px; margin-top: 10px;">APP LAUNCHES IN:</h3>
        
        <div class="countdown" id="countdownDisplay">
            <div class="time-box"><span id="days">00</span><small>Days</small></div>
            <div class="time-box"><span id="hours">00</span><small>Hours</small></div>
            <div class="time-box"><span id="minutes">00</span><small>Mins</small></div>
            <div class="time-box"><span id="seconds">00</span><small>Secs</small></div>
        </div>
    </div>

    <script>
        // DOM Elements
        const startState = document.getElementById('startState');
        const formState = document.getElementById('formState');
        const thankYouState = document.getElementById('thankYouState');
        const openFormBtn = document.getElementById('openFormBtn');
        const feedbackForm = document.getElementById('feedbackForm');
        const submitBtn = document.getElementById('submitBtn');
        const bgAudio = document.getElementById('bgMusic');
        const tickAudio = document.getElementById('tickMusic');

        // Logic for 6 hours cooldown
        const COOLDOWN_HOURS = 6;
        const COOLDOWN_MS = COOLDOWN_HOURS * 60 * 60 * 1000;

        function checkCooldown() {
            const lastSubmitTime = localStorage.getItem('lastFeedbackTime');
            if (lastSubmitTime) {
                const now = new Date().getTime();
                const timePassed = now - parseInt(lastSubmitTime);
                
                if (timePassed < COOLDOWN_MS) {
                    startState.style.display = 'none';
                    thankYouState.style.display = 'block';
                    return true;
                } else {
                    localStorage.removeItem('lastFeedbackTime');
                }
            }
            return false;
        }

        // On Page Load
        if (!checkCooldown()) {
            startState.style.display = 'block';
        }

        // Handle audio playback based on state when screen is clicked
        document.body.addEventListener('click', function() {
            if (bgAudio.paused) bgAudio.play();
            
            // If Thank You state is active (either just submitted or from cooldown)
            if (thankYouState.style.display === 'block') {
                if (tickAudio.paused) tickAudio.play();
            }
        });

        // Handle Opening the Form
        openFormBtn.addEventListener('click', function() {
            startState.style.display = 'none';
            formState.style.display = 'block';
        });

        // Reverse Countdown Logic to July 5, 2026
        const targetDate = new Date("July 5, 2026 00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById("countdownDisplay").innerHTML = "<h3 style='width: 100%; text-align: center; color: #4da6ff;'>Target Reached!</h3>";
                tickAudio.pause(); // Stop ticking when time is up
                return;
            }

            document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById("minutes").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById("seconds").innerText = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }

        // Run countdown timer every second
        setInterval(updateCountdown, 1000);
        updateCountdown(); // Call immediately on load

        // Handle Form Submission
        feedbackForm.addEventListener('submit', async function(e) {
            e.preventDefault(); 
            
            submitBtn.innerText = "Sending Mail...";
            submitBtn.disabled = true;
            
            try {
                const response = await fetch(feedbackForm.action, {
                    method: feedbackForm.method,
                    body: new FormData(feedbackForm),
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    localStorage.setItem('lastFeedbackTime', new Date().getTime());
                    feedbackForm.reset();
                    
                    formState.style.display = 'none';
                    thankYouState.style.display = 'block';
                    
                    // Automatically start the ticking sound upon form success
                    tickAudio.play().catch(e => console.log("Waiting for user tap to play audio"));

                } else {
                    throw new Error("Server error");
                }
            } catch (error) {
                submitBtn.innerText = "⚠️ Error. Try again.";
                setTimeout(() => {
                    submitBtn.innerText = "Send Mail";
                    submitBtn.disabled = false;
                }, 3000);
            }
        });
    </script>
</body>
</html>
